name: Twig CS Fixer

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  twig-cs-fixer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: composer install --no-progress --no-suggest --prefer-dist --no-interaction

      - name: Run Twig CS Fixer
        run: vendor/bin/twig-cs-fixer lint --fix
